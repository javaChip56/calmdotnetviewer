name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/CALMdotNetViewer.ViewerApp/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore src/CALMdotNetViewer.sln

      - name: Install frontend dependencies
        working-directory: src/CALMdotNetViewer.ViewerApp
        run: npm ci

      - name: Build .NET solution
        run: dotnet build src/CALMdotNetViewer.sln --configuration Release --no-restore

      - name: Run .NET tests
        run: dotnet test src/CALMdotNetViewer.sln --configuration Release --no-build

      - name: Run frontend tests
        working-directory: src/CALMdotNetViewer.ViewerApp
        run: npm test

      - name: Build frontend
        working-directory: src/CALMdotNetViewer.ViewerApp
        run: npm run build
